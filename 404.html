<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inbondz | Chat</title>
    <link rel="icon" href="https://www.inbondz.com/favicon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Carter+One&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #FFFFFF; --text-main: #111111; --text-light: #555555; --brand-color: #9EA3A3; --border: #E5E5E5; }
        * { margin: 0px; padding: 0px; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: Inter, system-ui, sans-serif; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }

        header { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 20px 40px; border-bottom: 1px solid var(--border); background: var(--bg-color); position: sticky; top: 0px; z-index: 100; }
        .hamburger-container { justify-self: start; }
        .hamburger { display: flex; flex-direction: column; gap: 6px; cursor: pointer; z-index: 200; width: 28px; }
        .hamburger span { width: 100%; height: 2px; background: var(--text-main); transition: 0.3s; }
        .hamburger.open span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }
        
        .logo { justify-self: center; font-family: "Carter One", cursive; font-size: 28px; color: var(--brand-color); text-decoration: none; letter-spacing: 0.5px; cursor: pointer; }
        .header-action { justify-self: end; }
        .btn-top { background: var(--text-main); color: rgb(255, 255, 255); padding: 10px 24px; border-radius: 100px; text-decoration: none; font-size: 14px; font-weight: 500; transition: 0.3s; border: 1px solid var(--text-main); display: inline-block; }
        .btn-top:hover { background: rgb(255, 255, 255); color: var(--text-main); }

        .menu-overlay { position: fixed; top: 0px; left: 0px; width: 100%; height: 100vh; background: rgba(255, 255, 255, 0.98); z-index: 150; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 0.3s; }
        .menu-overlay.active { opacity: 1; pointer-events: all; }
        .menu-overlay a { color: var(--text-main); font-size: 24px; text-decoration: none; margin: 16px 0px; font-weight: 500; cursor: pointer; transition: color 0.2s; }
        .menu-overlay a:hover { color: var(--brand-color); }

        main { flex: 1 1 0%; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; padding: 60px 20px; text-align: center; }
        
        .error-code { font-family: "Carter One", cursive; font-size: 80px; color: var(--border); margin-bottom: 16px; line-height: 1; }

        footer { border-top: 1px solid var(--border); padding: 32px 40px; display: flex; justify-content: space-between; align-items: center; background: var(--bg-color); flex-wrap: wrap; gap: 20px; margin-top: auto; }
        .footer-copy { font-size: 14px; color: var(--text-light); font-weight: 500; }
        .footer-copy span { font-family: "Carter One", cursive; color: var(--brand-color); font-size: 16px; }
        .social-links { display: flex; gap: 20px; align-items: center; }
        .social-links a { color: var(--text-main); transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .social-links a:hover { color: var(--brand-color); transform: translateY(-2px); }
        .social-icon { width: 22px; height: 22px; fill: currentcolor; }

        @media (max-width: 768px) {
            header { padding: 16px 20px; }
            footer { flex-direction: column; justify-content: center; text-align: center; }
        }
    </style>
</head>
<body>

    <header>
        <div class="hamburger-container">
            <div class="hamburger" id="hamburger" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </div>
        </div>
        <a href="https://chat.inbondz.com" class="logo">Inbondz Chat</a>
        <div class="header-action">
            <a href="https://donate.inbondz.com/" class="btn-top">Donate</a>
        </div>
    </header>

    <div class="menu-overlay" id="menuOverlay">
        <a href="https://www.inbondz.com">Home</a>
        <a href="https://docs.inbondz.com">Documentation</a>
        <a href="https://donate.inbondz.com">Donate</a>
    </div>

    <main>
        <div class="error-code">404</div>
        <p style="color: var(--text-light); margin-bottom: 32px; font-size: 18px; max-width: 400px; line-height: 1.6; margin-left: auto; margin-right: auto;">
            This directory does not exist on the Inbondz&nbsp;network.
        </p>
        <a href="https://chat.inbondz.com" class="btn-top">Return to Terminal</a>
    </main>

        </div>
    </footer>

    <script>
        function toggleMenu() {
            const hamburger = document.getElementById('hamburger');
            const menu = document.getElementById('menuOverlay');
            hamburger.classList.toggle('open');
            menu.classList.toggle('active');
            document.body.style.overflow = menu.classList.contains('active') ? 'hidden' : '';
        }
    </script>
</body>
</html>

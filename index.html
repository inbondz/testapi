<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inbondz API Tester</title>
    <style>
        :root {
            --bg: #000000;
            --card: #0a0a0a;
            --border: #1c1c1e;
            --text: #ffffff;
            --subtext: #8e8e93;
            --accent: #007aff; /* Apple Blue */
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            margin: 0; padding: 20px;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .mac-window {
            background: var(--card);
            border: 1px solid var(--border);
            width: 100%; max-width: 600px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        .window-header {
            background: #161617;
            padding: 12px 16px;
            display: flex; align-items: center;
            border-bottom: 1px solid var(--border);
        }
        .dot { width: 12px; height: 12px; border-radius: 50%; margin-right: 8px; }
        .red { background: #ff5f56; } .yellow { background: #ffbd2e; } .green { background: #27c93f; }
        .content { padding: 30px; }
        h1 { font-size: 22px; font-weight: 600; margin: 0 0 10px 0; }
        p { color: var(--subtext); font-size: 14px; margin-bottom: 25px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input {
            flex: 1; background: #000; border: 1px solid var(--border);
            border-radius: 8px; color: #fff; padding: 12px; font-size: 14px;
            outline: none; transition: border 0.2s;
        }
        input:focus { border-color: var(--accent); }
        .btn {
            background: var(--text); color: #000; border: none;
            padding: 0 20px; border-radius: 8px; font-weight: 600;
            cursor: pointer; transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }
        .json-viewer {
            background: #000; border: 1px solid var(--border);
            border-radius: 8px; padding: 15px; min-height: 150px;
            position: relative; overflow-x: auto;
        }
        pre { margin: 0; color: #30d158; font-family: "SF Mono", monospace; font-size: 13px; }
        .copy-trigger {
            position: absolute; top: 10px; right: 10px;
            background: rgba(255,255,255,0.1); color: var(--subtext);
            border: none; border-radius: 4px; padding: 4px 8px;
            font-size: 11px; cursor: pointer;
        }
        .donate-bar {
            margin-top: 20px; border-top: 1px solid var(--border);
            padding-top: 20px; display: none;
        }
        .error-text { color: #ff453a; font-weight: 600; }
    </style>
</head>
<body>
    <div class="mac-window">
        <div class="window-header">
            <div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div>
        </div>
        <div class="content">
            <h1>API Explorer</h1>
            <p>Test the Inbondz Edge infrastructure. Limit: 50 requests/day.</p>
            
            <div class="input-group">
                <input type="text" id="apiUrl" value="https://api.inbondz.com/v1/ping" readonly>
                <button class="btn" onclick="fetchData()">Run</button>
            </div>

            <div class="json-viewer">
                <button class="copy-trigger" onclick="copyJson()">Copy JSON</button>
                <pre id="output">// JSON result will appear here...</pre>
            </div>

            <div id="donateArea" class="donate-bar">
                <p class="error-text">Limit Reached. Infrastructure Overloaded.</p>
                <a href="https://donate.inbondz.com" style="color: var(--accent); text-decoration: none; font-size: 14px;">Donate to keep Inbondz online →</a>
            </div>
        </div>
    </div>

    <script>
        async function fetchData() {
            const output = document.getElementById('output');
            const donateArea = document.getElementById('donateArea');
            output.innerText = "// Loading...";
            
            try {
                const response = await fetch('https://api.inbondz.com/v1/ping');
                const data = await response.json();
                output.innerText = JSON.stringify(data, null, 2);
                
                if (response.status === 429) {
                    donateArea.style.display = 'block';
                }
            } catch (err) {
                output.innerText = "// Error: Network connection failed.";
            }
        }

        function copyJson() {
            const text = document.getElementById('output').innerText;
            navigator.clipboard.writeText(text);
            alert("JSON copied to clipboard.");
        }
    </script>
</body>
</html>

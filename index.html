<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inbondz | JSON Fetcher</title>
    <style>
        :root {
            --bg: #000000;
            --card: #0a0a0a;
            --border: #1c1c1e;
            --text: #ffffff;
            --subtext: #8e8e93;
            --accent: #007aff;
        }
        body {
            background: var(--bg); color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            margin: 0; padding: 20px;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .mac-window {
            background: var(--card); border: 1px solid var(--border);
            width: 100%; max-width: 650px; border-radius: 12px;
            overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        .window-header {
            background: #161617; padding: 12px 16px;
            display: flex; align-items: center; border-bottom: 1px solid var(--border);
        }
        .dot { width: 12px; height: 12px; border-radius: 50%; margin-right: 8px; }
        .red { background: #ff5f56; } .yellow { background: #ffbd2e; } .green { background: #27c93f; }
        .content { padding: 30px; }
        h1 { font-size: 22px; font-weight: 600; margin: 0 0 8px 0; }
        p { color: var(--subtext); font-size: 14px; margin-bottom: 24px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input {
            flex: 1; background: #000; border: 1px solid var(--border);
            border-radius: 8px; color: #fff; padding: 12px; font-size: 14px;
            outline: none; transition: border 0.2s; font-family: "SF Mono", monospace;
        }
        input:focus { border-color: var(--accent); }
        .btn {
            background: var(--text); color: #000; border: none;
            padding: 0 24px; border-radius: 8px; font-weight: 600;
            cursor: pointer; transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.8; }
        .json-viewer {
            background: #000; border: 1px solid var(--border);
            border-radius: 8px; padding: 16px; min-height: 200px;
            position: relative; overflow-x: auto;
        }
        pre { margin: 0; color: #30d158; font-family: "SF Mono", monospace; font-size: 13px; line-height: 1.4; }
        .copy-trigger {
            position: absolute; top: 12px; right: 12px;
            background: var(--border); color: var(--text);
            border: none; border-radius: 4px; padding: 6px 10px;
            font-size: 11px; font-weight: 500; cursor: pointer;
        }
        .copy-trigger:hover { background: #333; }
        .error-text { color: #ff453a; font-weight: 600; margin-bottom: 8px; }
        .donate-area { display: none; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }
    </style>
</head>
<body>
    <div class="mac-window">
        <div class="window-header">
            <div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div>
        </div>
        <div class="content">
            <h1>JSON Request Fetcher</h1>
            <p>Paste any valid API URL to execute a GET request and parse the response.</p>
            
            <div class="input-group">
                <input type="url" id="apiUrl" placeholder="https://api.inbondz.com/v1/ping">
                <button class="btn" onclick="fetchData()">Send</button>
            </div>

            <div class="json-viewer">
                <button class="copy-trigger" onclick="copyJson()">Copy JSON</button>
                <pre id="output">// Ready for input...</pre>
            </div>

            <div id="donateArea" class="donate-area">
                <div class="error-text">HTTP 429: Inbondz Network Limit Reached.</div>
                <a href="https://donate.inbondz.com" style="color: var(--accent); text-decoration: none; font-size: 14px;">Increase server allocation (Donate) →</a>
            </div>
        </div>
    </div>

    <script>
        async function fetchData() {
            const urlInput = document.getElementById('apiUrl').value;
            const output = document.getElementById('output');
            const donateArea = document.getElementById('donateArea');
            const copyBtn = document.querySelector('.copy-trigger');
            
            if (!urlInput) {
                output.innerText = "// Error: Please enter a URL.";
                output.style.color = "#ff453a";
                return;
            }

            output.style.color = "#30d158";
            output.innerText = "// Fetching data...";
            donateArea.style.display = 'none';
            copyBtn.innerText = "Copy JSON";
            
            try {
                const response = await fetch(urlInput);
                
                // Handle the custom 429 crash scenario gracefully
                if (response.status === 429) {
                    donateArea.style.display = 'block';
                }

                const data = await response.json();
                output.innerText = JSON.stringify(data, null, 2);
                
            } catch (err) {
                output.style.color = "#ff453a";
                output.innerText = "// Fetch Failed.\n// 1. Check if the URL is correct.\n// 2. The target API might be blocking this request (CORS error).\n// 3. DNS hasn't propagated yet.";
            }
        }

        function copyJson() {
            const text = document.getElementById('output').innerText;
            navigator.clipboard.writeText(text);
            const btn = document.querySelector('.copy-trigger');
            btn.innerText = "Copied!";
            setTimeout(() => { btn.innerText = "Copy JSON"; }, 2000);
        }
    </script>
</body>
</html>

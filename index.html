<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inbondz | Chat</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Carter+One&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0A0A0A; --surface: #1A1A1A; --text: #E5E5E5; --brand: #9EA3A3; --danger: #FF4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* HEADER */
        header { padding: 20px 40px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .logo { font-family: 'Carter One', cursive; font-size: 24px; color: var(--brand); text-decoration: none; letter-spacing: 0.5px; }
        .logo span { color: var(--text); }
        .status { font-size: 12px; display: flex; align-items: center; gap: 8px; color: #666; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #666; }
        .status-dot.online { background: #00C851; box-shadow: 0 0 8px #00C851; }
        
        /* PANELS */
        .panel { flex: 1; display: none; flex-direction: column; padding: 20px; max-width: 600px; margin: 0 auto; width: 100%; overflow: hidden; }
        .panel.active { display: flex; }
        #setup, #radar { justify-content: center; align-items: center; text-align: center; gap: 20px; }
        input { background: var(--surface); border: 1px solid #333; color: white; padding: 15px; border-radius: 8px; font-size: 16px; outline: none; width: 100%; text-align: center; letter-spacing: 2px; }
        input:focus { border-color: var(--brand); }
        button { background: var(--text); color: var(--bg); border: none; padding: 15px; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s; width: 100%; flex-shrink: 0; }
        button:hover { background: var(--brand); }
        .btn-outline { background: transparent; border: 1px solid #333; color: var(--text); }
        .radar-code { font-size: 32px; color: var(--brand); letter-spacing: 4px; margin: 20px 0; font-family: monospace; }
        
        /* CHAT UI */
        #chatBox { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; padding-right: 5px; }
        .msg { padding: 12px 16px; border-radius: 8px; max-width: 80%; line-height: 1.4; word-wrap: break-word; }
        .msg.self { background: var(--brand); color: var(--bg); align-self: flex-end; }
        .msg.peer { background: var(--surface); color: var(--text); align-self: flex-start; border: 1px solid #333; }
        .msg.system { background: transparent; color: #666; font-size: 12px; align-self: center; text-align: center; }
        .chat-controls { display: flex; gap: 10px; flex-shrink: 0; }
        .chat-controls input { text-align: left; letter-spacing: normal; }
        .btn-nuke { background: transparent; border: 1px solid var(--danger); color: var(--danger); margin-top: 15px; }
        .btn-nuke:hover { background: var(--danger); color: white; }

        /* FOOTER */
        footer { border-top: 1px solid #333; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; background: var(--bg); flex-shrink: 0; }
        .footer-copy { font-size: 14px; color: #666; font-weight: 500; }
        .footer-copy span { font-family: 'Carter One', cursive; color: var(--brand); font-size: 16px; }
        .social-links { display: flex; gap: 20px; align-items: center; }
        .social-links a { color: #666; text-decoration: none; font-size: 14px; transition: 0.2s; }
        .social-links a:hover { color: var(--brand); }

        @media(max-width: 768px) {
            header, footer { padding: 15px 20px; }
            footer { flex-direction: column; gap: 15px; text-align: center; }
        }
    </style>
</head>
<body>
    <header>
        <a href="#" class="logo">Inbondz <span>Chat</span></a>
        <div class="status"><span id="statusText">Disconnected</span><div class="status-dot" id="statusDot"></div></div>
    </header>

    <div id="setup" class="panel active">
        <h2 style="font-family: 'Carter One', cursive; font-weight: 400; font-size: 28px;">Initialize Tunnel</h2>
        <p style="color: #666; font-size: 14px; margin-bottom: 20px;">Peer-to-peer encrypted. No servers.</p>
        <button onclick="createRoom()">Generate Secure Room</button>
        <div style="color: #444; margin: 10px 0;">— OR —</div>
        <input type="text" id="joinId" placeholder="Enter Room ID" autocomplete="off" autocorrect="off" autocapitalize="characters">
        <button class="btn-outline" onclick="joinRoom()">Join Room</button>
    </div>

    <div id="radar" class="panel">
        <div style="color: #666;">Awaiting peer connection...</div>
        <div class="radar-code" id="displayRoomId">XXXX-XXXX</div>
        <p style="color: #666; font-size: 14px;">Send this code via a secure channel.<br>Keep this tab open.</p>
    </div>

    <div id="chat" class="panel">
        <div id="chatBox"></div>
        <div class="chat-controls">
            <input type="text" id="chatInput" placeholder="Message..." onkeypress="handleEnter(event)">
            <button style="width: 80px;" onclick="sendMessage()">Send</button>
        </div>
        <button class="btn-nuke" id="nukeBtn" onclick="nukeRoom()">Nuke Room</button>
    </div>

    <footer>
        <div class="footer-copy">© <span>Inbondz</span>. Architecting the Edge.</div>
        <div class="social-links">
            <a href="#">Privacy</a>
            <a href="#">Terms</a>
            <a href="#">GitHub</a>
            <a href="#">X</a>
        </div>
    </footer>

    <script>
        let peer = null, conn = null, activeRoomId = null, isCreator = false;
        const showPanel = (id) => { document.querySelectorAll('.panel').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); };
        const updateStatus = (online) => { document.getElementById('statusDot').classList.toggle('online', online); document.getElementById('statusText').innerText = online ? 'Tunnel Active' : 'Disconnected'; };
        const logSystem = (msg) => appendMessage({ type: 'system', text: msg });
        
        const loadHistory = (roomId) => {
            const history = JSON.parse(localStorage.getItem(`inbondz_room_${roomId}`) || '[]');
            document.getElementById('chatBox').innerHTML = '';
            history.forEach(appendMessage);
            if(history.length > 0) logSystem('Local history restored.');
        };
        const saveHistory = (roomId, messageObj) => {
            const history = JSON.parse(localStorage.getItem(`inbondz_room_${roomId}`) || '[]');
            history.push(messageObj);
            localStorage.setItem(`inbondz_room_${roomId}`, JSON.stringify(history));
        };

        const appendMessage = (data) => {
            const box = document.getElementById('chatBox');
            const div = document.createElement('div'); div.className = `msg ${data.type}`; div.innerText = data.text;
            box.appendChild(div); box.scrollTop = box.scrollHeight;
        };

        const wireConnection = (connection) => {
            conn = connection;
            conn.on('open', () => {
                updateStatus(true); showPanel('chat'); loadHistory(activeRoomId);
                document.getElementById('nukeBtn').style.display = isCreator ? 'block' : 'none';
            });
            conn.on('data', (data) => {
                if(data.cmd === 'NUKE') {
                    alert("The Creator has mathematically deleted this room.");
                    localStorage.removeItem(`inbondz_room_${activeRoomId}`);
                    location.reload();
                } else if(data.cmd === 'MSG') {
                    const msgObj = { type: 'peer', text: data.text };
                    appendMessage(msgObj); saveHistory(activeRoomId, msgObj);
                }
            });
            conn.on('close', () => { updateStatus(false); logSystem('Peer disconnected. Tunnel collapsed.'); conn = null; });
        };

        function createRoom() {
            isCreator = true; activeRoomId = 'IBZ-' + Math.random().toString(36).substring(2, 8).toUpperCase();
            peer = new Peer(activeRoomId);
            peer.on('open', (id) => { document.getElementById('displayRoomId').innerText = id; showPanel('radar'); });
            peer.on('connection', (connection) => {
                if (conn) { connection.on('open', () => { connection.send({ cmd: 'SYSTEM', text: 'Locked.' }); setTimeout(() => connection.close(), 500); }); return; }
                wireConnection(connection);
            });
        }

        function joinRoom() {
            isCreator = false; let targetId = document.getElementById('joinId').value.trim().toUpperCase(); if(!targetId) return;
            activeRoomId = targetId; peer = new Peer();
            peer.on('open', () => { const connection = peer.connect(activeRoomId); wireConnection(connection); });
            peer.on('error', (err) => { alert("Room not found. " + err.type); });
        }

        function sendMessage() {
            if(!conn || !conn.open) return;
            const input = document.getElementById('chatInput'); const text = input.value.trim(); if(!text) return;
            const msgObj = { type: 'self', text: text };
            appendMessage(msgObj); saveHistory(activeRoomId, msgObj);
            conn.send({ cmd: 'MSG', text: text }); input.value = '';
        }
        function handleEnter(e) { if(e.key === 'Enter') sendMessage(); }

        function nukeRoom() {
            if(!confirm("Wipe local data on both devices?")) return;
            if(conn && conn.open) conn.send({ cmd: 'NUKE' });
            localStorage.removeItem(`inbondz_room_${activeRoomId}`); location.reload();
        }
    </script>
</body>
</html>
